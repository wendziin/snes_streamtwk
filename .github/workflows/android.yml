name: Android Libretro Core Build

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        abi: [armeabi-v7a, arm64-v8a]

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Set up NDK
      uses: nttld/setup-ndk@v1
      with:
        ndk-version: r25c

    - name: Get prebuilt libcurl
      run: |
        git clone --depth 1 https://github.com/gustavogenovese/curl-android-ios.git curl_prebuilt
        mkdir -p $GITHUB_WORKSPACE/curl-out/include
        mkdir -p $GITHUB_WORKSPACE/curl-out/lib
        
        # Copy headers
        cp -r curl_prebuilt/prebuilt-with-ssl/android/include/* $GITHUB_WORKSPACE/curl-out/include/
        
        # Search and copy libs for ABI
        echo "Searching for libs for ${{ matrix.abi }}..."
        # Find all .a files that are in a path containing the ABI name
        find curl_prebuilt -name "*.a" | grep "${{ matrix.abi }}" | xargs -I {} cp -v {} $GITHUB_WORKSPACE/curl-out/lib/
        
        # Verify
        echo "CURL OUT LIB CONTENT:"
        ls -R $GITHUB_WORKSPACE/curl-out/lib
        
    - name: Build Snes9x Libretro Core
      run: |
        cd libretro/jni
        
        LIB_DIR="$GITHUB_WORKSPACE/curl-out/lib"
        CURL_LIB="$LIB_DIR/libcurl.a"
        SSL_LIB="$LIB_DIR/libssl.a"
        CRYPTO_LIB="$LIB_DIR/libcrypto.a"

        echo "Final Lib Paths:"
        ls -l "$CURL_LIB" || echo "CURL MISSING"
        ls -l "$SSL_LIB" || echo "SSL MISSING"
        ls -l "$CRYPTO_LIB" || echo "CRYPTO MISSING"

        # Initialize Android.mk
        echo "LOCAL_PATH := \$(call my-dir)" > Android.mk
        echo "USE_CURL := 1" >> Android.mk
        echo "" >> Android.mk
        
        # Add cURL module
        echo "include \$(CLEAR_VARS)" >> Android.mk
        echo "LOCAL_MODULE := curl_static" >> Android.mk
        echo "LOCAL_SRC_FILES := $CURL_LIB" >> Android.mk
        echo "include \$(PREBUILT_STATIC_LIBRARY)" >> Android.mk
        echo "" >> Android.mk

        # Add SSL if found
        if [ -f "$SSL_LIB" ]; then
            echo "include \$(CLEAR_VARS)" >> Android.mk
            echo "LOCAL_MODULE := ssl_static" >> Android.mk
            echo "LOCAL_SRC_FILES := $SSL_LIB" >> Android.mk
            echo "include \$(PREBUILT_STATIC_LIBRARY)" >> Android.mk
            echo "" >> Android.mk
        fi

        # Add Crypto if found
        if [ -f "$CRYPTO_LIB" ]; then
            echo "include \$(CLEAR_VARS)" >> Android.mk
            echo "LOCAL_MODULE := crypto_static" >> Android.mk
            echo "LOCAL_SRC_FILES := $CRYPTO_LIB" >> Android.mk
            echo "include \$(PREBUILT_STATIC_LIBRARY)" >> Android.mk
            echo "" >> Android.mk
        fi

        # Main core module
        echo "CORE_DIR := \$(LOCAL_PATH)/../.." >> Android.mk
        echo "include \$(CORE_DIR)/libretro/Makefile.common" >> Android.mk
        echo "" >> Android.mk
        echo "include \$(CLEAR_VARS)" >> Android.mk
        echo "LOCAL_MODULE    := retro" >> Android.mk
        echo "LOCAL_SRC_FILES := \$(SOURCES_C) \$(SOURCES_CXX)" >> Android.mk
        echo "LOCAL_C_INCLUDES += $GITHUB_WORKSPACE/curl-out/include" >> Android.mk
        
        # Link libraries
        echo "LOCAL_STATIC_LIBRARIES += curl_static" >> Android.mk
        if [ -f "$SSL_LIB" ]; then echo "LOCAL_STATIC_LIBRARIES += ssl_static" >> Android.mk; fi
        if [ -f "$CRYPTO_LIB" ]; then echo "LOCAL_STATIC_LIBRARIES += crypto_static" >> Android.mk; fi
        
        echo "LOCAL_LDLIBS += -lz -llog -ldl" >> Android.mk
        echo "LOCAL_CFLAGS += -DUSE_CURL" >> Android.mk
        echo "" >> Android.mk
        
        # Snes9x flags
        echo "COREFLAGS := -DANDROID -D__LIBRETRO__ -DHAVE_STRINGS_H -DRIGHTSHIFT_IS_SAR \$(INCFLAGS)" >> Android.mk
        echo "GIT_VERSION := \" \$(shell git rev-parse --short HEAD || echo unknown)\"" >> Android.mk
        echo "ifneq (\$(GIT_VERSION),\" unknown\")" >> Android.mk
        echo "  COREFLAGS += -DGIT_VERSION=\"\\\$(GIT_VERSION)\\\"" >> Android.mk
        echo "endif" >> Android.mk
        echo "" >> Android.mk
        echo "LOCAL_CXXFLAGS  := \$(COREFLAGS)" >> Android.mk
        echo "LOCAL_CFLAGS    += \$(COREFLAGS)" >> Android.mk
        echo "LOCAL_LDFLAGS   := -Wl,-version-script=\$(CORE_DIR)/libretro/link.T" >> Android.mk
        echo "include \$(BUILD_SHARED_LIBRARY)" >> Android.mk
        
        echo "Generated Android.mk:"
        cat Android.mk
        
        # Build
        $ANDROID_NDK_ROOT/ndk-build APP_ABI=${{ matrix.abi }} APP_PLATFORM=android-21 V=1 -j$(nproc)
        
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: snes9x_libretro_${{ matrix.abi }}
        path: libretro/libs/${{ matrix.abi }}/*.so
