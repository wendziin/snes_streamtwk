name: Android Libretro Core Build

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        abi: [armeabi-v7a, arm64-v8a]

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Set up NDK
      uses: nttld/setup-ndk@v1
      with:
        ndk-version: r25c

    - name: Get prebuilt libcurl
      run: |
        git clone --depth 1 https://github.com/gustavogenovese/curl-android-ios.git curl_prebuilt
        mkdir -p $GITHUB_WORKSPACE/curl-out/include/curl
        mkdir -p $GITHUB_WORKSPACE/curl-out/lib
        
        # Copy headers
        cp -r curl_prebuilt/prebuilt-with-ssl/android/include/curl/*.h $GITHUB_WORKSPACE/curl-out/include/curl/
        
        # Search and copy libraries for the specific ABI
        echo "Searching for libs for ${{ matrix.abi }}..."
        # Search in all directories but prioritize the ABI match
        find curl_prebuilt -name "*.a" | grep "${{ matrix.abi }}" | xargs -I {} cp {} $GITHUB_WORKSPACE/curl-out/lib/
        
        # If we didn't find any for this ABI, try to find them generally
        if [ ! -f "$GITHUB_WORKSPACE/curl-out/lib/libcurl.a" ]; then
            echo "Direct ABI match failed, searching everywhere..."
            find curl_prebuilt -name "libcurl.a" | head -n 1 | xargs -I {} cp {} $GITHUB_WORKSPACE/curl-out/lib/
        fi

        # Debug: list what we got
        echo "CURL OUT LIB CONTENT:"
        ls -R $GITHUB_WORKSPACE/curl-out/lib
        
    - name: Build Snes9x Libretro Core
      run: |
        cd libretro/jni
        
        LIB_DIR="$GITHUB_WORKSPACE/curl-out/lib"
        CURL_PATH="$LIB_DIR/libcurl.a"
        SSL_PATH="$LIB_DIR/libssl.a"
        CRYPTO_PATH="$LIB_DIR/libcrypto.a"

        # Create Android.mk
        cat <<EOF > Android.mk
        LOCAL_PATH := \$(call my-dir)
        USE_CURL := 1

        include \$(CLEAR_VARS)
        LOCAL_MODULE := curl_static
        LOCAL_SRC_FILES := $CURL_PATH
        include \$(PREBUILT_STATIC_LIBRARY)
EOF

        # Add SSL if found
        if [ -f "$SSL_PATH" ]; then
          cat <<EOF >> Android.mk
        include \$(CLEAR_VARS)
        LOCAL_MODULE := ssl_static
        LOCAL_SRC_FILES := $SSL_PATH
        include \$(PREBUILT_STATIC_LIBRARY)
EOF
        fi

        # Add Crypto if found
        if [ -f "$CRYPTO_PATH" ]; then
          cat <<EOF >> Android.mk
        include \$(CLEAR_VARS)
        LOCAL_MODULE := crypto_static
        LOCAL_SRC_FILES := $CRYPTO_PATH
        include \$(PREBUILT_STATIC_LIBRARY)
EOF
        fi

        cat <<EOF >> Android.mk
        CORE_DIR := \$(LOCAL_PATH)/../..
        include \$(CORE_DIR)/libretro/Makefile.common

        include \$(CLEAR_VARS)
        LOCAL_MODULE    := retro
        LOCAL_SRC_FILES := \$(SOURCES_C) \$(SOURCES_CXX)
        
        LOCAL_C_INCLUDES += $GITHUB_WORKSPACE/curl-out/include
        LOCAL_STATIC_LIBRARIES += curl_static
EOF

        if [ -f "$SSL_PATH" ]; then
          echo "LOCAL_STATIC_LIBRARIES += ssl_static" >> Android.mk
        fi
        if [ -f "$CRYPTO_PATH" ]; then
          echo "LOCAL_STATIC_LIBRARIES += crypto_static" >> Android.mk
        fi

        cat <<EOF >> Android.mk
        LOCAL_LDLIBS += -lz
        LOCAL_CFLAGS += -DUSE_CURL

        COREFLAGS := -DANDROID -D__LIBRETRO__ -DHAVE_STRINGS_H -DRIGHTSHIFT_IS_SAR \$(INCFLAGS)

        GIT_VERSION := " \$(shell git rev-parse --short HEAD || echo unknown)"
        ifneq (\$(GIT_VERSION)," unknown")
          COREFLAGS += -DGIT_VERSION=\\"\$(GIT_VERSION)\\"
        endif

        LOCAL_CXXFLAGS  := \$(COREFLAGS)
        LOCAL_CFLAGS    += \$(COREFLAGS)
        LOCAL_LDFLAGS   := -Wl,-version-script=\$(CORE_DIR)/libretro/link.T
        
        include \$(BUILD_SHARED_LIBRARY)
EOF
        
        # Build
        $ANDROID_NDK_ROOT/ndk-build APP_ABI=${{ matrix.abi }} APP_PLATFORM=android-21 V=1 -j$(nproc)
        
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: snes9x_libretro_${{ matrix.abi }}
        path: libretro/libs/${{ matrix.abi }}/*.so
