name: Android Libretro Core Build

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Only ARM architectures as requested
        abi: [armeabi-v7a, arm64-v8a]

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Set up NDK
      uses: nttld/setup-ndk@v1
      with:
        ndk-version: r25c

    - name: Get prebuilt libcurl
      run: |
        git clone --depth 1 https://github.com/gustavogenovese/curl-android-ios.git curl_prebuilt
        mkdir -p $GITHUB_WORKSPACE/curl-out/include
        mkdir -p $GITHUB_WORKSPACE/curl-out/lib
        
        # Copy headers
        cp -r curl_prebuilt/prebuilt-with-ssl/android/include/* $GITHUB_WORKSPACE/curl-out/include/
        
        # Find and copy libraries for the specific ABI
        # Some repos put them in subfolders or use different names
        echo "Searching for libs for ${{ matrix.abi }}..."
        find curl_prebuilt -name "*.a" | grep "${{ matrix.abi }}" || true
        
        # Copy whatever .a files we find for this ABI
        find curl_prebuilt -name "libcurl.a" | grep "${{ matrix.abi }}" | xargs -I {} cp {} $GITHUB_WORKSPACE/curl-out/lib/
        find curl_prebuilt -name "libssl.a" | grep "${{ matrix.abi }}" | xargs -I {} cp {} $GITHUB_WORKSPACE/curl-out/lib/
        find curl_prebuilt -name "libcrypto.a" | grep "${{ matrix.abi }}" | xargs -I {} cp {} $GITHUB_WORKSPACE/curl-out/lib/
        
        # Debug: list what we got
        echo "CURL OUT LIB CONTENT:"
        ls -R $GITHUB_WORKSPACE/curl-out/lib
        
    - name: Build Snes9x Libretro Core
      run: |
        cd libretro/jni
        
        # Identify available libraries in our output folder
        CURL_PATH=$(find $GITHUB_WORKSPACE/curl-out/lib -name "libcurl.a")
        SSL_PATH=$(find $GITHUB_WORKSPACE/curl-out/lib -name "libssl.a")
        CRYPTO_PATH=$(find $GITHUB_WORKSPACE/curl-out/lib -name "libcrypto.a")

        echo "Using libs:"
        echo "CURL: $CURL_PATH"
        echo "SSL: $SSL_PATH"
        echo "CRYPTO: $CRYPTO_PATH"

        # Create Android.mk
        cat <<EOF > Android.mk
        LOCAL_PATH := \$(call my-dir)
        USE_CURL := 1

        include \$(CLEAR_VARS)
        LOCAL_MODULE := curl_static
        LOCAL_SRC_FILES := $CURL_PATH
        include \$(PREBUILT_STATIC_LIBRARY)
        EOF

        if [ -n "$SSL_PATH" ]; then
          cat <<EOF >> Android.mk
        include \$(CLEAR_VARS)
        LOCAL_MODULE := ssl_static
        LOCAL_SRC_FILES := $SSL_PATH
        include \$(PREBUILT_STATIC_LIBRARY)
EOF
        fi

        if [ -n "$CRYPTO_PATH" ]; then
          cat <<EOF >> Android.mk
        include \$(CLEAR_VARS)
        LOCAL_MODULE := crypto_static
        LOCAL_SRC_FILES := $CRYPTO_PATH
        include \$(PREBUILT_STATIC_LIBRARY)
EOF
        fi

        cat <<EOF >> Android.mk
        CORE_DIR := \$(LOCAL_PATH)/../..
        include \$(CORE_DIR)/libretro/Makefile.common

        include \$(CLEAR_VARS)
        LOCAL_MODULE    := retro
        LOCAL_SRC_FILES := \$(SOURCES_C) \$(SOURCES_CXX)
        
        LOCAL_C_INCLUDES += $GITHUB_WORKSPACE/curl-out/include
        LOCAL_STATIC_LIBRARIES += curl_static
EOF

        if [ -n "$SSL_PATH" ]; then
          echo "LOCAL_STATIC_LIBRARIES += ssl_static" >> Android.mk
        fi
        if [ -n "$CRYPTO_PATH" ]; then
          echo "LOCAL_STATIC_LIBRARIES += crypto_static" >> Android.mk
        fi

        cat <<EOF >> Android.mk
        LOCAL_LDLIBS += -lz
        LOCAL_CFLAGS += -DUSE_CURL

        COREFLAGS := -DANDROID -D__LIBRETRO__ -DHAVE_STRINGS_H -DRIGHTSHIFT_IS_SAR \$(INCFLAGS)

        GIT_VERSION := " \$(shell git rev-parse --short HEAD || echo unknown)"
        ifneq (\$(GIT_VERSION)," unknown")
          COREFLAGS += -DGIT_VERSION=\\"\$(GIT_VERSION)\\"
        endif

        LOCAL_CXXFLAGS  := \$(COREFLAGS)
        LOCAL_CFLAGS    += \$(COREFLAGS)
        LOCAL_LDFLAGS   := -Wl,-version-script=\$(CORE_DIR)/libretro/link.T
        
        include \$(BUILD_SHARED_LIBRARY)
EOF
        
        # Build
        $ANDROID_NDK_ROOT/ndk-build APP_ABI=${{ matrix.abi }} APP_PLATFORM=android-21 V=1 -j$(nproc)
        
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: snes9x_libretro_${{ matrix.abi }}
        path: libretro/libs/${{ matrix.abi }}/*.so
