name: Android Libretro Core Build

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        abi: [armeabi-v7a, arm64-v8a, x86, x86_64]

    steps:
    - uses: actions/checkout@v3
      with:
        submodules: recursive

    - name: Set up NDK
      uses: nttld/setup-ndk@v1
      with:
        ndk-version: r25c

    - name: Get prebuilt libcurl
      run: |
        git clone --depth 1 https://github.com/gustavogenovese/curl-android-ios.git curl_prebuilt
        mkdir -p $GITHUB_WORKSPACE/curl-out/include
        mkdir -p $GITHUB_WORKSPACE/curl-out/lib
        cp -r curl_prebuilt/prebuilt-with-ssl/android/include/* $GITHUB_WORKSPACE/curl-out/include/
        cp curl_prebuilt/prebuilt-with-ssl/android/${{ matrix.abi }}/*.a $GITHUB_WORKSPACE/curl-out/lib/
        
    - name: Build Snes9x Libretro Core
      run: |
        cd libretro/jni
        # Prepare injection file
        cat <<EOF > curl_config.mk
        USE_CURL := 1
        LOCAL_C_INCLUDES += $GITHUB_WORKSPACE/curl-out/include
        LOCAL_LDFLAGS += $GITHUB_WORKSPACE/curl-out/lib/libcurl.a $GITHUB_WORKSPACE/curl-out/lib/libssl.a $GITHUB_WORKSPACE/curl-out/lib/libcrypto.a
        LOCAL_LDLIBS += -lz
        EOF
        
        # Inject into Android.mk
        sed -i '/include $(CLEAR_VARS)/i include $(LOCAL_PATH)/curl_config.mk' Android.mk
        
        # Build
        $ANDROID_NDK_ROOT/ndk-build APP_ABI=${{ matrix.abi }} APP_PLATFORM=android-21 USE_CURL=1 -j$(nproc)
        
    - name: Upload Artifact
      uses: actions/upload-artifact@v3
      with:
        name: snes9x_libretro_${{ matrix.abi }}
        path: libretro/libs/${{ matrix.abi }}/*.so
