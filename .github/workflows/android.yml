name: Android Libretro Core Build

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        abi: [armeabi-v7a, arm64-v8a, x86, x86_64]

    steps:
    - uses: actions/checkout@v3
      with:
        submodules: recursive

    - name: Set up NDK
      uses: nttld/setup-ndk@v1
      with:
        ndk-version: r25c

    - name: Get prebuilt libcurl
      run: |
        git clone --depth 1 https://github.com/gustavogenovese/curl-android-ios.git curl_prebuilt
        mkdir -p $GITHUB_WORKSPACE/curl-out/include/curl
        mkdir -p $GITHUB_WORKSPACE/curl-out/lib
        # Copy headers - ensuring they are in curl/ subdirectory
        cp -r curl_prebuilt/prebuilt-with-ssl/android/include/curl/*.h $GITHUB_WORKSPACE/curl-out/include/curl/
        cp curl_prebuilt/prebuilt-with-ssl/android/${{ matrix.abi }}/*.a $GITHUB_WORKSPACE/curl-out/lib/
        
    - name: Build Snes9x Libretro Core
      run: |
        cd libretro/jni
        
        # Define USE_CURL at the top of Android.mk
        sed -i '1i USE_CURL := 1' Android.mk
        
        # Setup PREBUILT_STATIC_LIBRARY for curl, ssl, crypto
        cat <<EOF > curl_prebuilt.mk
        include \$(CLEAR_VARS)
        LOCAL_MODULE := curl_static
        LOCAL_SRC_FILES := $GITHUB_WORKSPACE/curl-out/lib/libcurl.a
        include \$(PREBUILT_STATIC_LIBRARY)

        include \$(CLEAR_VARS)
        LOCAL_MODULE := ssl_static
        LOCAL_SRC_FILES := $GITHUB_WORKSPACE/curl-out/lib/libssl.a
        include \$(PREBUILT_STATIC_LIBRARY)

        include \$(CLEAR_VARS)
        LOCAL_MODULE := crypto_static
        LOCAL_SRC_FILES := $GITHUB_WORKSPACE/curl-out/lib/libcrypto.a
        include \$(PREBUILT_STATIC_LIBRARY)
        EOF
        
        # Inject PREBUILT modules at the top
        sed -i '2i include $(LOCAL_PATH)/curl_prebuilt.mk' Android.mk
        
        # Inject LOCAL_STATIC_LIBRARIES and includes into the main module
        cat <<EOF > curl_defs.mk
        LOCAL_C_INCLUDES += $GITHUB_WORKSPACE/curl-out/include
        LOCAL_STATIC_LIBRARIES += curl_static ssl_static crypto_static
        LOCAL_LDLIBS += -lz
        LOCAL_CFLAGS += -DUSE_CURL
        EOF
        
        sed -i '/include $(CLEAR_VARS)/r curl_defs.mk' Android.mk
        
        # Build with verbose output
        $ANDROID_NDK_ROOT/ndk-build APP_ABI=${{ matrix.abi }} APP_PLATFORM=android-21 V=1 -j$(nproc)
        
    - name: Upload Artifact
      uses: actions/upload-artifact@v3
      with:
        name: snes9x_libretro_${{ matrix.abi }}
        path: libretro/libs/${{ matrix.abi }}/*.so
