name: Android Libretro Core Build

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        abi: [armeabi-v7a, arm64-v8a, x86, x86_64]

    steps:
    - uses: actions/checkout@v3
      with:
        submodules: recursive

    - name: Set up NDK
      uses: nttld/setup-ndk@v1
      with:
        ndk-version: r25c

    - name: Build libcurl for Android
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential wget cmake
        
        # Build libcurl using a specialized script for Android
        git clone https://github.com/gcesarmza/curl-android-ios.git
        cd curl-android-ios
        ./curl-compile.sh --arch=${{ matrix.abi }} --with-android-ndk=$ANDROID_NDK_ROOT --android-api=21
        
        # Move built artifacts to a predictable location
        mkdir -p $GITHUB_WORKSPACE/curl-out
        cp -r build/curl/android/${{ matrix.abi }}/* $GITHUB_WORKSPACE/curl-out/
        
    - name: Build Snes9x Libretro Core
      run: |
        cd libretro/jni
        # Inject CURL paths into Android.mk via environment or sed
        echo "LOCAL_C_INCLUDES += $GITHUB_WORKSPACE/curl-out/include" >> Android.mk
        echo "LOCAL_LDLIBS += -L$GITHUB_WORKSPACE/curl-out/lib -lcurl" >> Android.mk
        
        $ANDROID_NDK_ROOT/ndk-build APP_ABI=${{ matrix.abi }} APP_PLATFORM=android-21 USE_CURL=1 -j$(nproc)
        
    - name: Upload Artifact
      uses: actions/upload-artifact@v3
      with:
        name: snes9x_libretro_${{ matrix.abi }}
        path: libretro/libs/${{ matrix.abi }}/*.so
