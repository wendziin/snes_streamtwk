name: Android Libretro Core Build

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        abi: [armeabi-v7a, arm64-v8a, x86, x86_64]

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Set up NDK
      uses: nttld/setup-ndk@v1
      with:
        ndk-version: r25c

    - name: Get prebuilt libcurl
      run: |
        git clone --depth 1 https://github.com/gustavogenovese/curl-android-ios.git curl_prebuilt
        mkdir -p $GITHUB_WORKSPACE/curl-out/include
        mkdir -p $GITHUB_WORKSPACE/curl-out/lib
        
        # Discover and copy headers
        find curl_prebuilt -name "curl" -type d -exec cp -r {} $GITHUB_WORKSPACE/curl-out/include/ \;
        
        # Discover and copy libraries for the specific ABI
        # We search for .a files in the ABI folder
        find curl_prebuilt/prebuilt-with-ssl/android/${{ matrix.abi }} -name "*.a" -exec cp {} $GITHUB_WORKSPACE/curl-out/lib/ \;
        
        # Debug: list what we got
        echo "CURL OUT STRUCTURE:"
        find $GITHUB_WORKSPACE/curl-out -maxdepth 3
        
    - name: Build Snes9x Libretro Core
      run: |
        cd libretro/jni
        
        # Identify available libraries
        CURL_LIB=$(find $GITHUB_WORKSPACE/curl-out/lib -name "libcurl.a")
        SSL_LIB=$(find $GITHUB_WORKSPACE/curl-out/lib -name "libssl.a")
        CRYPTO_LIB=$(find $GITHUB_WORKSPACE/curl-out/lib -name "libcrypto.a")
        
        if [ -z "$SSL_LIB" ] || [ -z "$CRYPTO_LIB" ]; then
            echo "SSL or Crypto libs not found in default locations, searching deeper..."
            SSL_LIB=$(find curl_prebuilt -name "libssl.a" | grep "${{ matrix.abi }}" | head -n 1)
            CRYPTO_LIB=$(find curl_prebuilt -name "libcrypto.a" | grep "${{ matrix.abi }}" | head -n 1)
        fi

        echo "Using libs:"
        echo "CURL: $CURL_LIB"
        echo "SSL: $SSL_LIB"
        echo "CRYPTO: $CRYPTO_LIB"

        # Create a completely new Android.mk to avoid sed mess
        cat <<EOF > Android.mk
        LOCAL_PATH := \$(call my-dir)
        USE_CURL := 1

        # Prebuilt modules
        include \$(CLEAR_VARS)
        LOCAL_MODULE := curl_static
        LOCAL_SRC_FILES := $CURL_LIB
        include \$(PREBUILT_STATIC_LIBRARY)

        include \$(CLEAR_VARS)
        LOCAL_MODULE := ssl_static
        LOCAL_SRC_FILES := $SSL_LIB
        include \$(PREBUILT_STATIC_LIBRARY)

        include \$(CLEAR_VARS)
        LOCAL_MODULE := crypto_static
        LOCAL_SRC_FILES := $CRYPTO_LIB
        include \$(PREBUILT_STATIC_LIBRARY)

        # Main core
        CORE_DIR := \$(LOCAL_PATH)/../..
        include \$(CORE_DIR)/libretro/Makefile.common

        include \$(CLEAR_VARS)
        LOCAL_MODULE    := retro
        LOCAL_SRC_FILES := \$(SOURCES_C) \$(SOURCES_CXX)
        
        # cURL definitions
        LOCAL_C_INCLUDES += $GITHUB_WORKSPACE/curl-out/include
        LOCAL_STATIC_LIBRARIES += curl_static ssl_static crypto_static
        LOCAL_LDLIBS += -lz
        LOCAL_CFLAGS += -DUSE_CURL

        COREFLAGS := -DANDROID -D__LIBRETRO__ -DHAVE_STRINGS_H -DRIGHTSHIFT_IS_SAR \$(INCFLAGS)

        GIT_VERSION := " \$(shell git rev-parse --short HEAD || echo unknown)"
        ifneq (\$(GIT_VERSION)," unknown")
          COREFLAGS += -DGIT_VERSION=\\"\$(GIT_VERSION)\\"
        endif

        LOCAL_CXXFLAGS  := \$(COREFLAGS)
        LOCAL_CFLAGS    += \$(COREFLAGS)
        LOCAL_LDFLAGS   := -Wl,-version-script=\$(CORE_DIR)/libretro/link.T
        
        include \$(BUILD_SHARED_LIBRARY)
        EOF
        
        # Build
        $ANDROID_NDK_ROOT/ndk-build APP_ABI=${{ matrix.abi }} APP_PLATFORM=android-21 V=1 -j$(nproc)
        
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: snes9x_libretro_${{ matrix.abi }}
        path: libretro/libs/${{ matrix.abi }}/*.so
